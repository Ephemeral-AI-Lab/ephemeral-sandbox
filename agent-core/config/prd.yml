# agent-core/config/prd.yml — committed baseline placeholder (no secrets).
#
# Runtime values have been moved to the gitignored agent-core/config/local.yml.
# `eos_config::load()` still loads this path first, then merges local.yml over it.

providers:
  active: unconfigured
  retry:
    max_retries: 3
    base_delay_s: 1.0
    max_delay_s: 30.0
    status_codes: [429, 500, 502, 503, 529]
  openai_api:
    base_url: https://api.openai.com
  anthropic_api:
    base_url: https://api.anthropic.com
  codex_coding_plan:
    base_url: https://chatgpt.com/backend-api/codex
  claude_coding_plan:
    base_url: https://api.anthropic.com

models:
  active: default-model
  registrations:
    - key: default-model
      label: Default Model

workflow:
  max-depth: 2
  attempt:
    max_concurrent_task_runs: 8
