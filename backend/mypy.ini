[mypy]
python_version = 3.12
mypy_path = src
explicit_package_bases = True
namespace_packages = True

# Repo-wide: lenient by default; tighten per-module below as files are cleaned.
ignore_missing_imports = True
warn_unused_ignores = False

# Strictly-checked modules (kept at zero errors — do not regress).
[mypy-team.*]
strict = True

[mypy-agents.*]
strict = True

# Third-party / dynamically-loaded modules without stubs.
[mypy-yaml]
ignore_missing_imports = True

[mypy-plugins.*]
ignore_missing_imports = True
