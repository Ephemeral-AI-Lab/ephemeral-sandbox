[package]
name = "eos-daemon"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[dependencies]
eos-checkpoint.workspace = true
eos-command-session.workspace = true
eos-command-ops.workspace = true
eos-ephemeral-workspace.workspace = true
eos-file-ops.workspace = true
eos-isolated-workspace.workspace = true
eos-namespace.workspace = true
eos-config.workspace = true
eos-layerstack.workspace = true
eos-overlay.workspace = true
eos-plugin.workspace = true
eos-plugin-ops.workspace = true
eos-runtime.workspace = true
# preserve_order is contract-load-bearing: request `args` keys must cross
# the wire in insertion order for byte-stable envelope round-trips.
serde_json = { workspace = true, features = ["preserve_order"] }
serde.workspace = true
tokio.workspace = true
tokio-util.workspace = true
thiserror.workspace = true
uuid.workspace = true

[dev-dependencies]
# Enable the package-root test seam only for the daemon's own test build; the
# production `[dependencies]` entry above leaves it off (resolver 2 keeps the
# dev-dependency feature out of the non-test build).
eos-plugin-ops = { workspace = true, features = ["test-root-override"] }
# Property tests for the absorbed wire envelope round-trip.
proptest.workspace = true

[lints]
workspace = true
