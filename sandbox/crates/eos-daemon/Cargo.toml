[package]
name = "eos-daemon"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[dependencies]
eos-cas.workspace = true
eos-config.workspace = true
eos-layerstack.workspace = true
eos-overlay.workspace = true
eos-occ.workspace = true
eos-occ-layerstack.workspace = true
eos-workspace-runtime.workspace = true
eos-plugin.workspace = true
# preserve_order is contract-load-bearing: request `args` keys must cross
# the wire in insertion order for byte-stable envelope round-trips.
serde_json = { workspace = true, features = ["preserve_order"] }
serde.workspace = true
sha2.workspace = true
tokio.workspace = true
tokio-util.workspace = true
thiserror.workspace = true
uuid.workspace = true

[target.'cfg(target_os = "linux")'.dependencies]
nix = { workspace = true, features = ["fs", "process", "signal"] }

[dev-dependencies]
# Enable the package-root test seam only for the daemon's own test build; the
# production `[dependencies]` entry above leaves it off (resolver 2 keeps the
# dev-dependency feature out of the non-test build).
eos-plugin = { workspace = true, features = ["test-root-override"] }
# Property tests for the absorbed wire envelope round-trip.
proptest.workspace = true

[lints]
workspace = true
