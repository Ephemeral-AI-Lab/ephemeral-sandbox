[package]
name = "eos-e2e-test"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Protocol-only sandbox correctness/pressure suite: drives a live eosd over eos-protocol."

[dependencies]
# The ONLY operation interface: raw eos-protocol envelopes against a live eosd.
eos-protocol = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
# Test-edge orchestration error type (binary/test boundary, per Rust guidance).
anyhow = { workspace = true }
# Committed topology config file (e2e.toml).
toml = { workspace = true }

[features]
# When enabled, a missing docker/eosd environment is a HARD failure instead of a
# graceful skip. CI runs `--features e2e` on Linux to enforce real execution;
# dev hosts run plain `cargo test` and skip the docker tiers cleanly.
e2e = []

[[test]]
name = "command_sessions"
path = "tests/command_sessions/mod.rs"

[[test]]
name = "isolated_workspace"
path = "tests/isolated_workspace/mod.rs"

[[test]]
name = "layerstack"
path = "tests/layerstack/mod.rs"

[[test]]
name = "occ"
path = "tests/occ/mod.rs"

[[test]]
name = "overlay"
path = "tests/overlay/mod.rs"

[[test]]
name = "pressure"
path = "tests/pressure/mod.rs"

[[test]]
name = "protocol"
path = "tests/protocol/mod.rs"

[[test]]
name = "workspace_ops"
path = "tests/workspace_ops/mod.rs"

[lints]
workspace = true
