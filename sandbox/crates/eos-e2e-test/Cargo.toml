[package]
name = "eos-e2e-test"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Protocol-only sandbox correctness/pressure suite: drives a live eosd over eos-protocol."

[dependencies]
# The ONLY operation interface: raw eos-protocol envelopes against a live eosd.
eos-config = { workspace = true }
eos-protocol = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
# Test-edge orchestration error type (binary/test boundary, per Rust guidance).
anyhow = { workspace = true }

[features]
# When enabled, a missing docker/eosd environment is a HARD failure instead of a
# graceful skip. CI runs `--features e2e` on Linux to enforce real execution;
# dev hosts run plain `cargo test` and skip the docker tiers cleanly.
e2e = []

[[test]]
name = "core"
path = "tests/core/mod.rs"

[[test]]
name = "daemon"
path = "tests/daemon/mod.rs"

[[test]]
name = "ephemeral_workspace"
path = "tests/ephemeral_workspace/mod.rs"

[[test]]
name = "workspace-runtime-isolated"
path = "tests/workspace-runtime-isolated/mod.rs"

[[test]]
name = "eos-layerstack"
path = "tests/eos-layerstack/mod.rs"

[[test]]
name = "eos-occ"
path = "tests/eos-occ/mod.rs"

[[test]]
name = "workspace-runtime-command-session"
path = "tests/workspace-runtime-command-session/mod.rs"

[[test]]
name = "pressure"
path = "tests/pressure/mod.rs"

[[test]]
name = "plugin"
path = "tests/plugin/mod.rs"

[lints]
workspace = true
