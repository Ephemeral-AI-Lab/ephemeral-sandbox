isolated_workspace:
  enabled: true
  upperdir_bytes: 67108864
  memavail_fraction: 0.9

runner:
  mount_mask:
    hidden_paths:
      - /eos
      - /sys/fs/cgroup
      - /tmp/eos-mask-test

eos_e2e_test:
  workload:
    concurrency_levels: [1, 3, 6, 12]
    write_iterations: 8
    sample_count: 3
    perf_artifact_dir: target/e2e-perf
    timeout_s: 30
