        "summary": "`core` owns the protocol-first smoke and contract surface for live `eosd`: runtime readiness, workspace binding/base setup, direct file ops, foreground exec, envelope guards, and basic audit/metrics visibility. It exercises daemon ops including `api.runtime.ready`, `api.v1.heartbeat`, `api.workspace.binding`, `api.layer_metrics`, `api.audit.snapshot`, `api.ensure_workspace_base`, `api.build_workspace_base`, `api.commit_to_workspace`, `api.v1.read_file`, `api.v1.write_file`, `api.v1.edit_file`, `api.v1.exec_command`, and raw malformed/auth envelope paths. Module config: `crates/eos-e2e-test/tests/core/config/default.test.yml`.",

          "api.build_workspace_base",
          "api.commit_to_workspace",
          "api.v1.read_file",
          "api.v1.write_file",
          "api.v1.edit_file",
          "api.v1.exec_command"
        ],
        "tags": [
          "core"
        ]
      },
      "checklist": [

          "title": "Runtime Base",
          "description": "Runtime readiness, probes, workspace binding, base-layer metrics, rebuild timing, heartbeat idle state, and base audit fields remain protocol-visible and coherent.",
          "tags": [
            "core"
          ]
        },
        {

          "tags": [
            "core"
          ]
        },
        {
          "id": "core-workspace-commit",
          "title": "Workspace Commit",
          "description": "Committing the LayerStack view to the workspace survives a base rebuild and keeps manifest audit fields aligned with the response.",
          "tags": [
            "core"
          ]

        {
          "id": "core-envelope-guards",
          "title": "Envelope Guards",

          "api.audit.pull",
          "api.audit.reset_floor",
          "api.plugin.ensure",

          "plugin.daemonplug.query"

        {

          "command": "cargo test -p eos-e2e-test --features e2e --test daemon -- --nocapture",

          "api.v1.write_file",

          "ephemeral_workspace",
          "ephemeral",
          "workspace"
        ]
      },
      "checklist": [
        {
          "id": "ephemeral_workspace-per-call-overlay",
          "title": "Per Call Overlay",
          "description": "Every foreground/background exec derives an ephemeral overlay over the latest workspace manifest and only finalized in-workspace deltas become workspace state.",
          "tags": [
            "ephemeral_workspace"
          ]
        },
        {
          "id": "ephemeral_workspace-outside-direct-fs",
          "title": "Outside Direct Fs",
          "description": "Writes outside the workspace are excluded from OCC `changed_paths` and remain direct container filesystem effects.",
          "tags": [
            "ephemeral_workspace"
          ]
        },
        {
          "id": "ephemeral_workspace-upperdir-delta",
          "title": "Upperdir Delta",
          "description": "Overlay upperdir accounting stays proportional to modified bytes and does not copy large lowerdir inputs.",
          "tags": [
            "ephemeral_workspace"
          ]
        },
        {
          "id": "ephemeral_workspace-overlay-cleanup",
          "title": "Overlay Cleanup",
          "description": "Completed foreground exec releases LayerStack leases, removes overlay scratch, and returns active lease metrics to zero.",
          "tags": [
            "ephemeral_workspace"
          ]
        },

          "tags": [
            "ephemeral_workspace"
          ]

          "description": "A long-running exec from a stale snapshot cannot silently overwrite newer direct file content.",
          "tags": [
            "ephemeral_workspace"

            "ephemeral_workspace"
          ]

          "tags": [
            "ephemeral_workspace"
          ]

          "id": "ephemeral_workspace-whiteout-resync",
