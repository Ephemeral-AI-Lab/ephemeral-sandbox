[package]
name = "eos-operation"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[dependencies]
eos-command.workspace = true
eos-config.workspace = true
eos-layerstack.workspace = true
eos-namespace.workspace = true
eos-overlay.workspace = true
eos-plugin.workspace = true
eos-trace.workspace = true
eos-workspace.workspace = true
nix = { workspace = true, features = ["process", "signal"] }
serde.workspace = true
# preserve_order keeps plugin ensure/route arg objects in insertion order on the wire.
serde_json = { workspace = true, features = ["preserve_order"] }
sha2.workspace = true
thiserror.workspace = true
uuid.workspace = true

[dev-dependencies]
eos-overlay = { workspace = true, features = ["test-root-override"] }

[features]
# Test-only seam: lets a caller redirect the managed package roots to temp dirs.
# Production builds MUST leave this off so the roots stay the fixed `/eos/...`
# managed paths and an untrusted plugin caller cannot redirect package publishing.
# The daemon enables it from its `[dev-dependencies]` so only its test build sees it.
test-root-override = []

[[test]]
name = "checkpoint_commit"
path = "tests/checkpoint/commit.rs"

[[test]]
name = "plugin_ppc_client"
path = "tests/plugin/ppc_client.rs"

[[test]]
name = "plugin_service_runtime"
path = "tests/plugin/service_runtime.rs"

[lints]
workspace = true
