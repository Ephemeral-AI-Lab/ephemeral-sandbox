daemon:
  server:
    socket_path: /eos/runtime/daemon/runtime.sock
    pid_path: /eos/runtime/daemon/runtime.pid
    worker_threads: 2
    max_blocking_threads: 8
    blocking_thread_keep_alive_s: 5
    max_concurrent_connections: 64

runtime:
  workspace:
    layer_stack_root: /eos/layer-stack
    scratch_root: /eos/workspace
    setup_timeout_s: 30
    exit_grace_s: 0.25
    rfc1918_egress: allow
  namespace_execution:
    scratch_root: /eos/namespace_execution
  layerstack:
    autosquash_policies:
      squash_at_n_layers: 100
  command:
    max_active: 32

runner:
  mount_mask:
    hidden_paths:
      - /eos

observability:
  resource_stats:
    enabled: true
    sample_interval_ms: 2000
    max_disk_bytes: 1048576

# Optional. Host paths resolve against the gateway's working directory.
manager:
  # Optional host directory allowlist for sandbox creation.
  # When set, create_sandbox must use one of these roots. When omitted,
  # existing API paths remain unrestricted.
  # workspace_roots:
  #   - /Users/me/projects
  docker:
    # De-privileged container boundary (Phase 3): cap_add SYS_ADMIN+NET_ADMIN,
    # Docker's default seccomp, and no-new-privileges instead of --privileged.
    privileged: false
    # Host-built Linux musl sandbox-daemon artifact uploaded into each sandbox
    # container. create_sandbox does not build a custom container image.
    daemon_binary_path: dist/sandbox-daemon-linux-arm64
    # Daemon config YAML uploaded into each container.
    daemon_config_yaml_path: config/prd.yml
    resource_profile: standard
    resource_profiles:
      standard:
        nano_cpus: 1000000000
        memory_high_bytes: 402653184
        memory_max_bytes: 536870912
        pids_max: 256
        daemon_runtime_profile: standard
        separate_workload_cgroup: true
      build-heavy:
        nano_cpus: 4000000000
        memory_high_bytes: 3221225472
        memory_max_bytes: 4294967296
        pids_max: 1024
        daemon_runtime_profile: build-heavy
        separate_workload_cgroup: true
    # Environment injected into every sandbox container. The Docker CLI injects
    # these proxy vars from ~/.docker/config.json, but the Engine API used here
    # does not, so sandboxes need them declared to share Docker Desktop's egress.
    container_env:
      HTTP_PROXY: http://http.docker.internal:3128
      HTTPS_PROXY: http://http.docker.internal:3128
      NO_PROXY: localhost,127.0.0.1,::1
