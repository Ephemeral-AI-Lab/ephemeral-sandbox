version: 1

daemon:
  server:
    socket_path: /eos/runtime/daemon/runtime.sock
    pid_path: /eos/runtime/daemon/runtime.pid
    max_worker_threads: 4

  commands:
    scratch_root: /eos/scratch/commands
  cgroup_monitor:
    enabled: true
    sample_interval_ms: 1000
    retained_samples_per_target: 100
    include_pids: true
    include_pressure: true
    include_disk: true
  telemetry:
    enabled: false
    service_name: sandbox-daemon
    level: info
  idle_workspace_eviction:
    interval_ms: 500

runtime:
  workspace:
    layer_stack_root: /eos/layer-stack
    scratch_root: /eos/scratch/workspace
    ttl_s: 1800
    total_cap: 5
    upperdir_bytes: 1073741824
    memavail_fraction: 0.5
    setup_timeout_s: 30
    exit_grace_s: 0.25
    rfc1918_egress: allow

runner:
  child_wait_poll_ms: 5
  mount_mask:
    hidden_paths:
      - /eos
      - /sys/fs/cgroup
  env:
    inherit_keys: [PATH, HOME, USER, LANG, LC_ALL, TERM, TZ]
    restricted_keys:
      - LD_PRELOAD
      - LD_LIBRARY_PATH
      - LD_AUDIT
      - DYLD_INSERT_LIBRARIES
      - DYLD_LIBRARY_PATH
      - PATH
      - PYTHONPATH
      - BASH_ENV
      - ENV
    default_path: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    testbed_path_prefix:
      - /opt/miniconda3/envs/testbed/bin
      - /opt/miniconda3/bin
